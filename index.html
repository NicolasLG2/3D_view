<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visualiseur 3D</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .viewer {
      flex: 1;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="viewer">
    <model-viewer
      src="model.glb"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      alt="Modèle 3D 1">
    </model-viewer>
  </div>

  <div class="viewer">
    <model-viewer
      src="model2.glb"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      alt="Modèle 3D 2">
    </model-viewer>
  </div>
</div>

</body>
</html>
